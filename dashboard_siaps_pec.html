                                        <div key={ind} className="bg-white border border-slate-200 p-3 rounded-xl shadow-sm space-y-3">
                                          <div className="flex items-center justify-between border-b border-slate-100 pb-1.5">
                                            <div className="flex items-center gap-2">
                                              <span className="text-[9px] font-black bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded border border-indigo-200">{ind}</span>
                                              <span className="text-[10px] text-slate-600 font-bold">Metas de Evolução Assistencial</span>
                                            </div>
                                          </div>
                                          {audit.gains && audit.gains.length > 0 && (
                                            <div className="bg-emerald-50 border border-emerald-200 p-2.5 rounded-lg">
                                              <div className="text-[10px] font-black text-emerald-700 flex items-center gap-1.5 mb-2"><span className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> GANHOU O "X"</div>
                                              <ul className="space-y-1.5">{audit.gains.map((g, idx) => <li key={idx} className="text-[9.5px] text-slate-700"><div className="flex justify-between"><span><span className="text-emerald-600 font-bold">(+)</span> <strong>[{g.item}]</strong> {g.desc}</span><span className="text-emerald-600 font-mono font-bold">+{g.pts}pts</span></div></li>)}</ul>
                                            </div>
                                          )}
                                          {audit.losses && audit.losses.length > 0 && (
                                            <div className="bg-rose-50 border border-rose-200 p-2.5 rounded-lg">
                                              <div className="text-[10px] font-black text-rose-700 flex items-center gap-1.5 mb-2"><span className="w-1.5 h-1.5 rounded-full bg-rose-500"></span> PERDEU O "X"</div>
                                              <ul className="space-y-2">{audit.losses.map((l, idx) => <li key={idx} className="text-[9.5px] text-slate-700 border-b border-rose-100 pb-2"><div className="flex justify-between"><span><span className="text-rose-600 font-bold">(-)</span> <strong>[{l.item}]</strong> {l.desc}</span><span className="text-rose-600 font-mono font-bold">-{l.pts}pts</span></div></li>)}</ul>
                                            </div>
                                          )}
                                          {audit.maintained && audit.maintained.length > 0 && (
                                            <div className="bg-slate-50 border border-slate-200 p-2 rounded-lg">
                                              <div className="text-[9px] font-black text-slate-500 mb-1">MANTIDOS COM "X"</div>
                                              <ul className="space-y-1.5">{audit.maintained.map((m, idx) => <li key={idx} className="text-[9px] text-slate-600 flex justify-between border-b border-slate-200 pb-1.5"><span>(=) [{m.item}] {m.desc}</span><span className="font-mono font-bold">({m.pts}pts)</span></li>)}</ul>
                                            </div>
                                          )}
                                          {audit.pending && audit.pending.length > 0 && (
                                            <div className="bg-slate-50 border border-slate-200 p-2 rounded-lg">
                                              <div className="text-[9px] font-black text-slate-500 mb-1">GAPs CONTINUADOS</div>
                                              <ul className="space-y-2">{audit.pending.map((x, idx) => <li key={idx} className="text-[9px] text-slate-600 flex flex-col border-b border-slate-200 pb-1.5"><div className="flex justify-between"><span>(!) [{x.item}] {x.desc}</span><span className="font-mono">({x.pts}pts sob risco)</span></div>{x.warning && <span className="text-[8.5px] font-bold text-rose-600 mt-0.5">{x.warning}</span>}</li>)}</ul>
                                            </div>
                                          )}
                                        </div>
                                      );
                                  })}
                                </div>
                              </td>
                            </tr>
                          );
                        }) : <tr><td colSpan="4" className="text-center py-10 text-slate-500 font-medium">Nenhum paciente atende aos critérios atuais.</td></tr>}
                      </tbody>
                    </table>
                  </div>
                  <Pagination currentPage={currentPagePats} totalItems={tableFilteredPatients.length} rowsPerPage={rowsPerPage} onPageChange={setCurrentPagePats} />
                </div>
              </div>
            )}

            {/* ABA ROTEIRO DE RUA (ACS) */}
            {activeTab === 'roteiro' && (
              <div className="space-y-6 animate-fade-in relative z-10">
                {renderFastSearchFilters()}
                {renderDetailedSearchBar()}

                <div className="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                  <div className="flex flex-col md:flex-row md:items-center justify-between border-b border-slate-100 pb-4 mb-4 gap-4">
                     <div>
                        <h2 className="text-base font-black text-emerald-600 tracking-tight">Roteiro de Campo Prático do ACS</h2>
                        <p className="text-[10px] text-slate-500 mt-1 uppercase font-bold tracking-widest">Lista de pacientes agrupados por Endereço para otimização de rota.</p>
                     </div>
                     <button onClick={handleExportHTML} className="w-full sm:w-auto bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-4 py-2.5 rounded-lg text-xs flex items-center justify-center gap-2 transition-all shadow-md">
                        <BookOpen className="w-4 h-4" /> Exportar Roteiro PDF/HTML (Pronto p/ Impressão)
                     </button>
                  </div>
                  
                  {}
                  <div className="overflow-x-auto min-h-[400px]">
                    <table className="w-full text-left border-collapse whitespace-nowrap text-[10px]">
                      <thead>
                        <tr className="bg-slate-50 text-[9px] font-black uppercase text-slate-500 tracking-wider border-b border-slate-200">
                           <th className="px-3 py-2 border-r border-slate-100">Sinc.</th>
                           <th className="px-3 py-2 border-r border-slate-100">Eq/MA</th>
                           <th className="px-3 py-2 border-r border-slate-100">Paciente</th>
                           <th className="px-3 py-2 border-r border-slate-100">Idade</th>
                           <th className="px-3 py-2 border-r border-slate-100">Endereço</th>
                           <th className="px-3 py-2 border-r border-slate-100">Pendências de Visita</th>
                           <th className="px-3 py-2">Últ. Visita</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100">
                         {pagedRoteiro.length > 0 ? pagedRoteiro.map(p => {
                            const coreInds = p.indicadores ? p.indicadores.filter(ind => CORE_INDICATORS.includes(ind)) : [];
                            const hasSiaps = coreInds.some(ind => p.bp?.['SIAPS']?.[ind] !== undefined);
                            const hasPec = coreInds.some(ind => ['W1','W2','W3','W4'].some(bucket => p.bp?.[bucket]?.[ind] !== undefined));
                            let syncText = "Sinc."; if (!hasSiaps && hasPec) syncText = "Só PEC"; if (hasSiaps && !hasPec) syncText = "Só SIAPS";
                            
                            return (
                               <tr key={p.id} className="hover:bg-slate-50">
                                  <td className="px-3 py-2 border-r border-slate-100 font-bold text-slate-500">{syncText}</td>
                                  <td className="px-3 py-2 border-r border-slate-100 font-bold text-slate-700">{p.equipe}<br/>MA: {p.microarea === "XX" ? "XX" : p.microarea}</td>
                                  <td className="px-3 py-2 border-r border-slate-100 font-bold text-slate-800 max-w-[150px] truncate" title={p.nomePec || p.nomeSiaps}>{p.bolsaFamilia && <span className="text-amber-600 mr-1">[BF]</span>}{p.nomePec || p.nomeSiaps}</td>
                                  <td className="px-3 py-2 border-r border-slate-100">{p.idade && p.idade !== "N/I" ? p.idade : 'N/I'}</td>
                                  <td className="px-3 py-2 border-r border-slate-100 max-w-[180px] truncate" title={p.endereco}>{p.endereco}</td>
                                  <td className="px-3 py-2 border-r border-slate-100 max-w-[250px] whitespace-normal">
                                     {coreInds.map(ind => {
                                         const recs = p.recommendations?.[latestPecBucket]?.[ind];
                                         if (!recs) return null;
                                         const visitPendings = (recs.pending || []).filter(x => VISIT_ITEMS_MAP[ind]?.includes(x.item));
                                         if(visitPendings.length === 0) return null;
                                         return (
                                            <div key={ind} className="mb-1 pb-1 border-b border-slate-100 last:border-0">
                                               <span className="font-bold text-rose-600">[{ind}]</span> {visitPendings.map(v => <span key={v.item} className="text-slate-600 block leading-tight mt-0.5">{v.desc} {v.warning && <strong className="text-rose-500 block">{v.warning}</strong>}</span>)}
                                            </div>
                                         );
                                     })}
                                  </td>
                                  <td className="px-3 py-2 font-bold text-slate-700">{p.ultimaVisitaACS && p.ultimaVisitaACS !== "Sem registro" ? p.ultimaVisitaACS.split('-').reverse().join('/') : "Sem Reg."}</td>
                               </tr>
                            );
                         }) : <tr><td colSpan="7" className="text-center py-6 text-slate-500">Nenhum paciente filtrado.</td></tr>}
                      </tbody>
                    </table>
                  </div>
                  <Pagination currentPage={currentPageRot} totalItems={tableFilteredPatients.length} rowsPerPage={rowsPerPage} onPageChange={setCurrentPageRot} />
                </div>
              </div>
            )}

            {}
            {/* ABA EXAMES */}
            {activeTab === 'exames' && (
              <div className="space-y-6 animate-fade-in relative z-10">
                {renderDetailedSearchBar()}
                
                <div className="bg-white border border-slate-200 p-4 rounded-xl flex flex-wrap gap-4 items-center shadow-sm">
                   <div className="flex flex-col gap-1.5 min-w-[200px]">
                       <label className="text-[9px] font-black text-slate-500 uppercase tracking-wider">Filtrar por Tipo de Exame</label>
                       <MultiSelect 
                           options={[
                               {value: 'C4-E', label: 'Hemoglobina Glicada (C4)'},
                               {value: 'C7-A', label: 'Citopatológico - Colo Útero (C7)'},
                               {value: 'C7-D', label: 'Mamografia (C7)'}
                           ]} 
                           selected={selectedExameTypes} 
                           onChange={setSelectedExameTypes} 
                           placeholder="Todos os Exames Alvo" 
                       />
                   </div>
                   <div className="flex flex-col gap-1.5 min-w-[200px]">
                       <label className="text-[9px] font-black text-slate-500 uppercase tracking-wider">Status do Exame</label>
                       <select value={statusExameFilter} onChange={e => setStatusExameFilter(e.target.value)} className="w-full px-2.5 py-1.5 bg-white border border-slate-300 rounded-lg text-xs text-slate-800 focus:outline-none focus:border-indigo-500">
                           <option value="TODOS">Todos os Status</option>
                           <option value="OK">OK (Realizados/Avaliados)</option>
                           <option value="PENDENTES">Pendentes (Necessitam Busca)</option>
                       </select>
                   </div>
                   <div className="flex-1 flex justify-end">
                       <button onClick={handleExportExamesHTML} className="bg-amber-600 hover:bg-amber-700 text-white font-bold px-4 py-2.5 rounded-lg text-xs flex items-center justify-center gap-2 transition-all shadow-md">
                           <Microscope className="w-4 h-4" /> Exportar Relatório de Exames
                       </button>
                   </div>
                </div>

                <div className="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                   <div className="overflow-x-auto min-h-[400px]">
                    <table className="w-full text-left border-collapse whitespace-nowrap text-[10px]">
                      <thead>
                        <tr className="bg-amber-50 text-[9px] font-black uppercase text-amber-800 tracking-wider border-b border-amber-200">
                           <th className="px-3 py-2 border-r border-amber-100">Paciente</th>
                           <th className="px-3 py-2 border-r border-amber-100">Exame Monitorado</th>
                           <th className="px-3 py-2 border-r border-amber-100">Status Atual</th>
                           <th className="px-3 py-2 border-r border-amber-100">Data Ref.</th>
                           <th className="px-3 py-2">Eq/MA</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100">
                         {pagedExames.length > 0 ? pagedExames.map(p => {
                            const renderExamRow = (ind, item, title, dateField) => {
                                const isNa = p.bp?.['SIAPS']?.[ind]?.[item] === 'NA' || p.bp?.[latestPecBucket]?.[ind]?.[item] === 'NA';
                                if (isNa) return null;

                                const hasPecItem = p.bp?.[latestPecBucket]?.[ind]?.[item] === true;
                                const hasSiapsItem = p.bp?.['SIAPS']?.[ind]?.[item] === true;
                                const status = (hasPecItem || hasSiapsItem) ? 'OK' : 'PENDENTES';

                                if (statusExameFilter !== 'TODOS' && statusExameFilter !== status) return null;
                                
                                const rawDate = dateField ? p.dataExecucoes?.[dateField] : null;
                                const formattedDate = (rawDate && rawDate !== "Sem registro" && rawDate !== "-") ? rawDate.split('-').reverse().join('/') : "S/D";

                                return (
                                    <tr key={`${p.id}-${ind}-${item}`} className="hover:bg-slate-50">
                                        <td className="px-3 py-2 border-r border-slate-100">
                                            <div className="font-bold text-slate-800 max-w-[180px] truncate">{p.nomePec || p.nomeSiaps}</div>
                                            <div className="text-[8.5px] text-slate-500 font-mono mt-0.5">CPF: {p.cpf !== 'N/I' ? p.cpf : p.cns}</div>
                                        </td>
                                        <td className="px-3 py-2 border-r border-slate-100 font-bold text-amber-700">[{ind}] {title}</td>
                                        <td className="px-3 py-2 border-r border-slate-100">
                                            <span className={`px-2 py-0.5 rounded text-[9px] font-black tracking-widest ${status === 'OK' ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}`}>{status}</span>
                                            <div className="text-[8px] text-slate-500 mt-1">PEC: {hasPecItem?'SIM':'NÃO'} | SIAPS: {hasSiapsItem?'SIM':'NÃO'}</div>
                                        </td>
                                        <td className="px-3 py-2 border-r border-slate-100 font-mono text-slate-600">{formattedDate}</td>
                                        <td className="px-3 py-2 text-slate-600 font-bold">{p.equipe} / {p.microarea === "XX" ? "XX" : p.microarea}</td>
                                    </tr>
                                );
                            };

                            const rows = [];
                            const showAll = selectedExameTypes.length === 0;

                            if ((showAll || selectedExameTypes.includes('C4-E')) && p.indicadores?.includes('C4')) {
                                const r = renderExamRow('C4', 'E', 'Hemo. Glicada', 'hemo');
                                if (r) rows.push(r);
                            }
                            if ((showAll || selectedExameTypes.includes('C7-A')) && p.indicadores?.includes('C7')) {
                                const r = renderExamRow('C7', 'A', 'Colo do Útero', 'exameColo');
                                if (r) rows.push(r);
                            }
                            if ((showAll || selectedExameTypes.includes('C7-D')) && p.indicadores?.includes('C7')) {
                                const r = renderExamRow('C7', 'D', 'Mamografia', null);
                                if (r) rows.push(r);
                            }

                            return rows;
                         }) : <tr><td colSpan="5" className="text-center py-6 text-slate-500">Nenhum exame monitorado atende aos filtros.</td></tr>}
                      </tbody>
                    </table>
                   </div>
                   <Pagination currentPage={currentPageExames} totalItems={examesFilteredPatients.length} rowsPerPage={rowsPerPage} onPageChange={setCurrentPageExames} />
                </div>
              </div>
            )}

            {}
            {/* ABA LOGS & PYTHON */}
            {activeTab === 'logs' && (
              <div className="space-y-4 animate-fade-in relative z-10">
                <div className="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-xl">
                  <div className="bg-slate-800 px-5 py-3 border-b border-slate-700 flex items-center justify-between">
                    <h3 className="text-xs font-black text-white uppercase tracking-widest flex items-center gap-2"><Terminal className="h-4 w-4 text-indigo-400" /> Console de Diagnóstico (Pyodide Wasm)</h3>
                    <button onClick={() => setShowPythonCodePanel(!showPythonCodePanel)} className="text-[10px] bg-slate-700 hover:bg-slate-600 text-slate-300 px-3 py-1.5 rounded font-bold transition-colors shadow-sm">
                      {showPythonCodePanel ? 'Ocultar Motor Python' : 'Ver Código Python (Motor)'}
                    </button>
                  </div>
                  
                  {showPythonCodePanel && (
                    <div className="p-4 bg-slate-950 border-b border-slate-800 overflow-x-auto">
                      <pre className="text-[10px] text-emerald-400 font-mono leading-relaxed">
                        <code>{PYTHON_CALCULATOR_CODE}</code>
                      </pre>
                    </div>
                  )}

                  <div className="p-5 h-96 overflow-y-auto font-mono text-[10px] space-y-2">
                    {appLogs.map((log, idx) => (
                      <div key={idx} className={`flex gap-3 pb-2 border-b border-slate-800/50 ${log.type === 'ERROR' ? 'text-rose-400' : log.type === 'SUCCESS' ? 'text-emerald-400' : log.type === 'WARNING' ? 'text-amber-400' : 'text-slate-400'}`}>
                        <span className="opacity-50 shrink-0">[{log.time}]</span>
                        <span className="shrink-0 font-bold w-20">{log.type}</span>
                        <span className="break-all whitespace-pre-wrap">{log.msg}</span>
                      </div>
                    ))}
                    {appLogs.length === 0 && <div className="text-slate-500 italic">Nenhum evento registrado na sessão.</div>}
                  </div>
                </div>
              </div>
            )}

          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
