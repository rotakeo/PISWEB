}

BASELINE_DATE_STR = "2026-05-20"
baseline_dt = datetime.strptime(BASELINE_DATE_STR, "%Y-%m-%d")

def fast_parse_date(d_str):
    try:
        y, m, d = int(d_str[0:4]), int(d_str[5:7]), int(d_str[8:10])
        return datetime(y, m, d)
    except Exception:
        return None

def get_days_remaining(last_date_str, validity_days):
    if not last_date_str or last_date_str in ["Sem registro", "-", ""]:
        return {"status": "expired", "days": 0, "label": "Inexistente"}
    
    last_date = fast_parse_date(last_date_str)
    if not last_date:
        return {"status": "expired", "days": 0, "label": "Erro na Data"}
        
    diff_days = (baseline_dt - last_date).days
    remaining = validity_days - diff_days
    
    if remaining <= 0:
        return {"status": "expired", "days": remaining, "label": f"Expirado ({abs(remaining)}d)"}
    if remaining <= 30:
        return {"status": "expiring", "days": remaining, "label": f"Vence em {remaining}d"}
    return {"status": "valid", "days": remaining, "label": f"Vigente ({remaining}d)"}

def get_next_best_date_str(last_visit_str):
    last_dt = fast_parse_date(last_visit_str)
    if not last_dt:
        return "Imediato (Sem registro recente)"
    ideal_date = last_dt + timedelta(days=30)
    return ideal_date.strftime("%d/%m/%Y")

def calculate_interval_audit(p):
    alt_vis = p.get("ultimaVisitaACS", "Sem registro")
    penult_vis = p.get("penultimaVisitaACS", "Sem registro")
    
    d1 = fast_parse_date(alt_vis)
    d2 = fast_parse_date(penult_vis)
    
    if not d1 or not d2:
        return {"valido": True, "redundante": False, "msg": "Aguardando registros domiciliares."}
        
    diff_days = abs((d1 - d2).days)
    if diff_days < 30:
        next_date = get_next_best_date_str(alt_vis)
        return {
            "valido": True,
            "redundante": True,
            "msg": f"Trabalho Redundante: Visita efetuada com apenas {diff_days} dias de diferença.",
            "proxima_visita_ideal": next_date
        }
    return {"valido": True, "redundante": False, "msg": "Intervalo de visitas inalterado (OK)."}

def is_patient_nearing_deadline(p):
    has_expiring = False
    execs = p.get("dataExecucoes", {})
    validity_map = {"consulta": 180, "pa": 180, "antropo": 365, "hemo": 365}
    if execs:
        for key, date_str in execs.items():
            if date_str and key in validity_map:
                rem = get_days_remaining(date_str, validity_map[key])
                if rem["status"] == "expiring":
                    has_expiring = True
    alt_vis = p.get("ultimaVisitaACS", "Sem registro")
    if alt_vis and alt_vis not in ["Sem registro", "-"]:
        rem_vis = get_days_remaining(alt_vis, 365)
        if rem_vis["status"] == "expiring":
            has_expiring = True
    return has_expiring

def patient_needs_and_lacks_visit(p, pec_bucket):
    inds = p.get("indicadores", [])
    visit_keys_map = {"C2": ["D"], "C3": ["E", "J"], "C4": ["D"], "C5": ["D"], "C6": ["C"]}
    visit_inds = [ind for ind in inds if ind in visit_keys_map]
    
    if not visit_inds: return False
    let_vis = p.get("ultimaVisitaACS", "Sem registro")
    if let_vis and let_vis not in ["Sem registro", "-", ""]: return False
        
    for ind in visit_inds:
        keys = visit_keys_map[ind]
        bp_siaps = p.get("bp", {}).get("SIAPS", {}).get(ind, {})
        bp_pec = p.get("bp", {}).get(pec_bucket, {}).get(ind, {})
        for key in keys:
            if bp_siaps.get(key, False) or bp_pec.get(key, False):
                return False 
    return True

def calculate_score(patient, indicator, bucket):
    meta = METODOLOGIA.get(indicator)
    if not meta: return None
    if indicator not in patient.get("indicadores", []): return None
        
    bp_bucket = patient.get("bp", {}).get(bucket, {})
    if indicator not in bp_bucket:
        return None
        
    bp_data = bp_bucket.get(indicator, {})
    score = 0
    max_possible = 0
    
    for key, item in meta["items"].items():
        is_checked = bp_data.get(key, False)
        
        # Ignora itens sinalizados como N/A para não rebaixar a nota geral do paciente (Isenção)
        if is_checked == "NA":
            continue
            
        max_possible += item["pts"]
        if is_checked is True:
            score += item["pts"]
            
    if max_possible == 0: 
        return None # Caso paciente seja isento 100% de todo o indicador
        
    final_score = (score / max_possible) * 100
    return min(int(final_score), 100)

def get_recommendations(patient, indicator, bucket):
    meta = METODOLOGIA.get(indicator)
    if not meta: return None
    if indicator not in patient.get("indicadores", []): return None
        
    bp_bucket = patient.get("bp", {}).get(bucket, {})
    if indicator not in bp_bucket and indicator not in patient.get("bp", {}).get("SIAPS", {}):
        return None
        
    bp_siaps = patient.get("bp", {}).get("SIAPS", {}).get(indicator, {})
    bp_pec = bp_bucket.get(indicator, {})
    acs_audit = calculate_interval_audit(patient)
    
    gains, losses, maintained, pending = [], [], [], []
    
    item_expiry_map = {
        "C4": {"A": ("consulta", 180), "B": ("pa", 180), "C": ("antropo", 365), "E": ("hemo", 365), "D": ("ultimaVisitaACS", 365)},
        "C5": {"A": ("consulta", 180), "B": ("pa", 180), "C": ("antropo", 365), "D": ("ultimaVisitaACS", 365)},
        "C6": {"A": ("consulta", 365), "B": ("antropo", 365), "C": ("ultimaVisitaACS", 365)},
        "C7": {"A": ("exameColo", 1095)}
    }
    
    for key, item in meta["items"].items():
        siaps_checked = bp_siaps.get(key, False)
        pec_checked = bp_pec.get(key, False)
        
        # Ignora da auditoria e cobrança caso os motores PEC ou SIAPS confirmem isenção "NA"
        if pec_checked == "NA" or siaps_checked == "NA":
            continue
            
        is_acs_visit_key = ((indicator == 'C4' and key == 'D') or (indicator == 'C5' and key == 'D') or (indicator == 'C6' and key == 'C'))
        is_redundant_visit = is_acs_visit_key and acs_audit.get("redundante", False)
        
        pts, desc = item["pts"], item["desc"]
        warning_msg = None
        map_info = item_expiry_map.get(indicator, {}).get(key)
        
        if map_info and (pec_checked or siaps_checked):
            field, validity = map_info
            date_val = patient.get("ultimaVisitaACS") if field == "ultimaVisitaACS" else patient.get("dataExecucoes", {}).get(field)
            if date_val and date_val not in ["Sem registro", "-", ""]:
                rem = get_days_remaining(date_val, validity)
                if rem["status"] == "expiring":
                    warning_msg = f"Prazo clínico vencerá em breve (Restam apenas {rem['days']} dias)."

        if is_redundant_visit:
            next_ideal_dt = acs_audit.get("proxima_visita_ideal", "N/D")
            pending.append({"item": key, "desc": desc, "pts": pts, "warning": f"Trabalho Redundante: Visite a partir de {next_ideal_dt} para pontuar validamente."})
            continue

        if pec_checked and not siaps_checked:
            gains.append({"item": key, "desc": desc, "pts": pts, "reason": "Novo requisito faturado com sucesso no PEC.", "warning": warning_msg})
        elif not pec_checked and siaps_checked:
            losses.append({"item": key, "desc": desc, "pts": pts, "reason": "Requisito expirou ou não consta novo faturamento no PEC.", "is_glosa": False})
        elif pec_checked and siaps_checked:
            rec_next_visit_msg = None
            if is_acs_visit_key:
                next_ideal_dt = get_next_best_date_str(patient.get("ultimaVisitaACS"))
                rec_next_visit_msg = f"Próxima visita recomendada a partir de {next_ideal_dt}."
            maintained.append({"item": key, "desc": desc, "pts": pts, "warning": warning_msg, "proxima_visita_sugerida": rec_next_visit_msg})
        else:
            rec_next_visit_msg = None
            if is_acs_visit_key:
                ult_vis = patient.get("ultimaVisitaACS")
                if not ult_vis or ult_vis in ["Sem registro", "-", ""]: rec_next_visit_msg = "Faça a 1ª visita agora."
                else: rec_next_visit_msg = f"Reclame o ponto! Faça a visita a partir de {get_next_best_date_str(ult_vis)}."
            elif indicator == 'C4' and key == 'E':
                rec_next_visit_msg = "Sem registro de Hemoglobina Glicada no PEC e no SIAPS."
            elif indicator == 'C7' and key == 'D':
                rec_next_visit_msg = "Paciente elegível, mas sem registro no PEC e SIAPS."
            elif indicator == 'C7' and key == 'A':
                rec_next_visit_msg = "Paciente elegível, mas sem registro de citopatológico."
                
            pending.append({"item": key, "desc": desc, "pts": pts, "warning": rec_next_visit_msg})
            
    return {"gains": gains, "losses": losses, "maintained": maintained, "pending": pending}

def evaluate_patient_audits(p, pec_bucket):
    has_gain, has_loss, has_parcial = False, False, False
    is_sem_visita = patient_needs_and_lacks_visit(p, pec_bucket)

    for ind in p.get("indicadores", []):
        if ind not in ["C2", "C3", "C4", "C5", "C6", "C7"]: continue
        recs = get_recommendations(p, ind, pec_bucket)
        if not recs: continue
        if recs["gains"]: has_gain = True
        if recs["losses"]: has_loss = True
            
        score = calculate_score(p, ind, pec_bucket)
        if score is not None and 0 < score < 100: has_parcial = True

    is_manter_nao_perder = is_patient_nearing_deadline(p)

        const m = String(date.getUTCMonth() + 1).padStart(2, '0');

    const parseCSVText = (text) => {
      const rows = []; let currentRow = []; let currentCell = ''; let inQuotes = false;
      const delimiter = (text.split('\n')[0].match(/;/g) || []).length > (text.split('\n')[0].match(/,/g) || []).length ? ';' : ',';

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        if (char === '"') {
          if (inQuotes && text[i + 1] === '"') { currentCell += '"'; i++; } else { inQuotes = !inQuotes; }
        } else if (char === delimiter && !inQuotes) {
          currentRow.push(currentCell.trim()); currentCell = '';
        } else if ((char === '\r' || char === '\n') && !inQuotes) {
          if (char === '\r' && text[i + 1] === '\n') i++; 
          currentRow.push(currentCell.trim());
          if (currentRow.some(cell => cell !== '')) rows.push(currentRow);
          currentRow = []; currentCell = '';
        } else { currentCell += char; }
      }

      for (let i = 1; i < rows.length; i++) {

                          if (critVal === true) {
                              row[letter] = pts; // Coloca a exata pontuação da meta

                              row[letter] = 'NA';
                          } else {
                              row[letter] = ''; // Substitui falso ou caracteres esquisitos por vazio

                  row['DATA_EXAME_COLO'] = getOriginalVal('DATA_EXAME_COLO') || (p.dataExecucoes?.exameColo && p.dataExecucoes?.exameColo !== "Sem registro" ? p.dataExecucoes?.exameColo : '');

                  const formatExportDate = (val) => {
                      if (!val || val === "Sem registro" || val === "-" || val === "N/D" || val === "N/I") return val;
                      let str = String(val).trim();
                      
                      if (/^\d{4,5}(\.\d+)?$/.test(str)) {
                          const date = new Date(Math.round((parseFloat(str) - 25569) * 86400 * 1000));
                          const y = date.getUTCFullYear();
                          const m = String(date.getUTCMonth() + 1).padStart(2, '0');
                          const d = String(date.getUTCDate()).padStart(2, '0');
                          return `${d}/${m}/${y}`;

                          const datePart = str.split(' ')[0];

                              return `${parts[2]}/${parts[1]}/${parts[0]}`;

                <thead style="display: table-header-group;">
                  <tr style="background-color: #f1f5f9; border-bottom: 2px solid #0f172a; font-weight: 800; text-transform: uppercase; font-size: 9px; color: #334155; page-break-inside: avoid;">
                    <th style="padding: 8px 6px; border: 1px solid #cbd5e1; width: 5%;">Sinc</th>
                    <th style="padding: 8px 6px; border: 1px solid #cbd5e1; width: 8%;">Eq/MA</th>
                    <th style="padding: 8px 6px; border: 1px solid #cbd5e1; width: 14%;">Paciente</th>
                    <th style="padding: 8px 6px; border: 1px solid #cbd5e1; width: 4%;">Idade</th>
                    <th style="padding: 8px 6px; border: 1px solid #cbd5e1; width: 11%;">CPF/CNS</th>
                    <th style="padding: 8px 6px; border: 1px solid #cbd5e1; width: 15%;">Endereço</th>
                    <th style="padding: 8px 6px; border: 1px solid #cbd5e1; width: 7%;">Comorb.</th>
                    <th style="padding: 8px 6px; border: 1px solid #cbd5e1; width: 26%; background-color: #fef3c7;">Status / Auditoria dos Exames</th>
                    <th style="padding: 8px 6px; border: 1px solid #cbd5e1; width: 10%;">Últ. Visita</th>
                  </tr>
                </thead>
                <tbody>
          `;

          group.patients.forEach(p => {
            const coreInds = p.indicadores ? p.indicadores.filter(ind => CORE_INDICATORS.includes(ind)) : [];
            const hasSiaps = coreInds.some(ind => p.bp?.['SIAPS']?.[ind] !== undefined);
            const hasPec = coreInds.some(ind => ['W1','W2','W3','W4'].some(bucket => p.bp?.[bucket]?.[ind] !== undefined));

            let syncText = "Sinc."; if (!hasSiaps && hasPec) syncText = "Só PEC"; if (hasSiaps && !hasPec) syncText = "Só SIAPS";
            const formattedName = `${p.bolsaFamilia ? "[BF] " : ""}${(p.nomePec || p.nomeSiaps || "Sem Nome").toUpperCase()}`;
            const identifier = p.cpf !== "N/I" ? p.cpf : p.cns;

            let examesHtml = '';
            const showAll = selectedExameTypes.length === 0;

            const buildExamHtml = (ind, item, title, dateField) => {
                const isNa = p.bp?.['SIAPS']?.[ind]?.[item] === 'NA' || p.bp?.[latestPecBucket]?.[ind]?.[item] === 'NA';
                if (isNa) return;

                const hasPecItem = p.bp?.[latestPecBucket]?.[ind]?.[item] === true;
                const hasSiapsItem = p.bp?.['SIAPS']?.[ind]?.[item] === true;
                const status = (hasPecItem || hasSiapsItem) ? 'OK' : 'PENDENTES';

                if (statusExameFilter !== 'TODOS' && statusExameFilter !== status) return;

                const statusColor = status === 'OK' ? '#16a34a' : '#b91c1c';
                const rawDate = dateField ? p.dataExecucoes?.[dateField] : null;
                const formattedDate = (rawDate && rawDate !== "Sem registro" && rawDate !== "-") ? rawDate.split('-').reverse().join('/') : "S/D";
                
                const auditText = p.audits?.[latestPecBucket]?.[ind] || p.audits?.['SIAPS']?.[ind];
                const intMedStr = p.intMed && p.intMed !== "Sem registro" ? (p.intMed.includes('-') ? p.intMed.split('-').reverse().join('/') : p.intMed) : "Sem registro";
                const intEnfStr = p.intEnf && p.intEnf !== "Sem registro" ? (p.intEnf.includes('-') ? p.intEnf.split('-').reverse().join('/') : p.intEnf) : "Sem registro";

                examesHtml += `
                    <div style="margin-bottom: 4px; padding-bottom: 4px; border-bottom: 0.5px dotted #cbd5e1;">
                        <strong style="color: #b45309; font-size: 9px;">[${ind}-${item}]</strong> <span style="font-size: 8.5px; color: #000; font-weight: bold;">${title}</span>
                        <div style="margin-top: 2px; font-size: 8.5px; font-weight: bold; color: ${statusColor};">Status: ${status} | PEC: ${hasPecItem?'SIM':'NÃO'} | SIAPS: ${hasSiapsItem?'SIM':'NÃO'}</div>
                        ${auditText && auditText.trim() !== '' ? `<div style="margin-top: 3px; font-size: 8px; color: #334155; background-color: #f1f5f9; padding: 3px; border-radius: 2px;"><strong>Auditoria (Planilha):</strong> ${auditText}</div>` : ''}
                        <div style="margin-top: 3px; font-size: 8px; color: #475569; display: flex; gap: 10px;">
                            <span><strong>Médico:</strong> ${intMedStr}</span>
                            <span><strong>Enf:</strong> ${intEnfStr}</span>
                        </div>
                        ${dateField ? `<div style="font-size: 8px; color: #475569; margin-top: 2px;">Data Ref: ${formattedDate}</div>` : ''}
                    </div>`;
            };

            if ((showAll || selectedExameTypes.includes('C4-E')) && p.indicadores?.includes('C4')) {
                buildExamHtml('C4', 'E', 'Hemo. Glicada', 'hemo');
            }
            if ((showAll || selectedExameTypes.includes('C7-A')) && p.indicadores?.includes('C7')) {
                buildExamHtml('C7', 'A', 'Citopatológico (Colo)', 'exameColo');
            }
            if ((showAll || selectedExameTypes.includes('C7-D')) && p.indicadores?.includes('C7')) {
                buildExamHtml('C7', 'D', 'Mamografia', null);
            }

            if (!examesHtml) examesHtml = `<span style="color: #475569; font-style: italic; font-size: 8.5px;">Sem exames filtrados.</span>`;

            groupHTML += `
              <tr style="border-bottom: 1px solid #cbd5e1; page-break-inside: avoid !important; break-inside: avoid !important;">
                <td style="padding: 8px 6px; border: 1px solid #cbd5e1; font-weight: bold; font-size: 9px; vertical-align: top; color: #000000;">${syncText}</td>
                <td style="padding: 8px 6px; border: 1px solid #cbd5e1; font-weight: bold; font-size: 9px; vertical-align: top; color: #000000;">${p.equipe}<br/>MA: ${p.microarea === "XX" ? "XX" : p.microarea}</td>
                <td style="padding: 8px 6px; border: 1px solid #cbd5e1; font-weight: bold; font-size: 9px; vertical-align: top; word-wrap: break-word; white-space: normal; color: #000000;">${formattedName}</td>
                <td style="padding: 8px 6px; border: 1px solid #cbd5e1; vertical-align: top; color: #000000; font-size: 9px;">${p.idade && p.idade !== "N/I" ? p.idade : 'N/I'}</td>
                <td style="padding: 8px 6px; border: 1px solid #cbd5e1; font-family: monospace; font-size: 8.5px; vertical-align: top; color: #000000;">${identifier}</td>
                <td style="padding: 8px 6px; border: 1px solid #cbd5e1; font-size: 8.5px; vertical-align: top; word-wrap: break-word; white-space: normal; color: #000000;">${p.endereco}</td>
                <td style="padding: 8px 6px; border: 1px solid #cbd5e1; font-size: 9px; font-weight: bold; color: #1e40af; vertical-align: top; word-wrap: break-word; white-space: normal;">${coreInds.join(', ')}</td>
                <td style="padding: 8px 6px; border: 1px solid #cbd5e1; font-size: 9px; vertical-align: top; background-color: #fffbeb; word-wrap: break-word; white-space: normal; color: #000000;">${examesHtml}</td>
                <td style="padding: 8px 6px; border: 1px solid #cbd5e1; font-size: 9px; font-weight: bold; vertical-align: top; color: #000000;">${p.ultimaVisitaACS && p.ultimaVisitaACS !== "Sem registro" ? p.ultimaVisitaACS.split('-').reverse().join('/') : "Sem Reg."}</td>
              </tr>
            `;
          });
          groupHTML += `</tbody></table></div>`;
          fullHTML += groupHTML;
        });

        const finalWrappedHTML = `
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Relatório de Exames Monitorados</title>
    <style>
        @media print {
            .page-break { page-break-before: always; }
            body { margin: 0; padding: 0; background-color: white; }
            .no-print { display: none; }
        }
        body { font-family: Arial, sans-serif; background-color: #f8fafc; margin: 0; padding: 20px; color: #0f172a; }
        .container { max-width: 1400px; margin: 0 auto; background-color: #ffffff; padding: 20px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border-radius: 8px; }
        .print-btn { background-color: #d97706; color: white; border: none; padding: 10px 20px; font-size: 14px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
        .print-btn:hover { background-color: #b45309; }
    </style>
</head>
<body>
    <div class="no-print" style="text-align: center;">
        <button class="print-btn" onclick="window.print()">[Imprimir / Salvar como PDF]</button>
    </div>
    <div class="container">
        ${fullHTML}
    </div>
</body>
</html>
        `;

        const blob = new Blob([finalWrappedHTML], { type: 'text/html;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Relatorio_Exames_${new Date().toISOString().slice(0,10)}.html`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        showToastNotification("Relatório HTML emitido com sucesso!", "success");
        setAppLogs(logs => [{ time: new Date().toLocaleTimeString(), type: 'SUCCESS', msg: 'Relatório de Exames HTML (Pronto para impressão) exportado com sucesso.' }, ...logs]);
      };

      const uniqueTeams = useMemo(() => {
        const t = new Set(); patientsData.forEach(p => { if (p.equipe && p.equipe !== "Sem Equipe") t.add(p.equipe); });
        return ['Todas', ...Array.from(t).sort()];
      }, [patientsData]);

      const uniqueMicroareas = useMemo(() => {
        const m = new Set(); patientsData.forEach(p => { m.add(p.microarea || "XX"); });
        return Array.from(m).sort((a,b) => {
          if (a === "XX") return 1; if (b === "XX") return -1;
          return Number(a) - Number(b);
        });
      }, [patientsData]);

      const baseFilteredPatients = useMemo(() => {
        return patientsData.filter(p => {
          if (selectedTeam !== 'Todas' && p.equipe !== selectedTeam) return false;
          if (selectedMicroareas.length > 0 && !selectedMicroareas.includes(String(p.microarea || "XX"))) return false;
          
          const coreInds = p.indicadores ? p.indicadores.filter(ind => CORE_INDICATORS.includes(ind)) : [];
          if (coreInds.length === 0) return false;

          const isFullySincronizado = coreInds.every(ind => {
              const inSiaps = p.bp?.['SIAPS']?.[ind] !== undefined;
              const inPec = ['W1','W2','W3','W4'].some(bucket => p.bp?.[bucket]?.[ind] !== undefined);
              return inSiaps && inPec;
          });

          if (baseFilter === 'sincronizada' && !isFullySincronizado) return false;
          if (baseFilter === 'nao_sincronizada' && isFullySincronizado) return false;
          return true;
        });
      }, [patientsData, selectedTeam, selectedMicroareas, baseFilter]);

      const countPura = useMemo(() => patientsData.filter(p => (selectedTeam === 'Todas' || p.equipe === selectedTeam) && (selectedMicroareas.length === 0 || selectedMicroareas.includes(String(p.microarea || "XX"))) && p.indicadores?.some(ind => CORE_INDICATORS.includes(ind))).length, [patientsData, selectedTeam, selectedMicroareas]);
      const countSincronizada = useMemo(() => patientsData.filter(p => {
        if ((selectedTeam !== 'Todas' && p.equipe !== selectedTeam) || (selectedMicroareas.length > 0 && !selectedMicroareas.includes(String(p.microarea || "XX")))) return false;
        const coreInds = p.indicadores ? p.indicadores.filter(ind => CORE_INDICATORS.includes(ind)) : [];
        if (coreInds.length === 0) return false;
        
        return coreInds.every(ind => {
            const inSiaps = p.bp?.['SIAPS']?.[ind] !== undefined;
            const inPec = ['W1','W2','W3','W4'].some(b => p.bp?.[b]?.[ind] !== undefined);
            return inSiaps && inPec;
        });
      }).length, [patientsData, selectedTeam, selectedMicroareas]);
      const countNaoSincronizada = countPura - countSincronizada;

      const preAuditPatients = useMemo(() => {
          return baseFilteredPatients.filter(p => {
              if (patientIndicatorFilter !== 'TODAS' && p.indicadores && !p.indicadores.includes(patientIndicatorFilter)) return false;
              
              if (searchQuery.trim() !== '') {
                  const q = searchQuery.toLowerCase();
                  return (p.nomePec && p.nomePec.toLowerCase().includes(q)) || 
                         (p.nomeSiaps && p.nomeSiaps.toLowerCase().includes(q)) || 
                         p.cpf.includes(q) || 
                         p.cns.includes(q) ||
                         (p.endereco && p.endereco.toLowerCase().includes(q));
              }
              return true;
          });
      }, [baseFilteredPatients, patientIndicatorFilter, searchQuery]);

      const auditCounts = useMemo(() => {
          const counts = { todos: preAuditPatients.length, ganhou_pec_no_siaps: 0, perdeu_x: 0, para_perder_x: 0, sem_visita: 0, bolsa_familia: 0 };
          preAuditPatients.forEach(p => {
             if (p.bolsaFamilia) counts.bolsa_familia++;
             if (p.audit_eval) {
               if (p.audit_eval.hasGain) counts.ganhou_pec_no_siaps++;
               if (p.audit_eval.hasLoss) counts.perdeu_x++;
               if (p.audit_eval.hasParcial) counts.para_perder_x++;
               if (p.audit_eval.isSemVisita) counts.sem_visita++;
             }
          });
          return counts;
      }, [preAuditPatients, latestPecBucket]);

      const tableFilteredPatients = useMemo(() => {
        const filtered = preAuditPatients.filter(p => {
          if (activeAuditFilter !== 'todos') {
              if (activeAuditFilter === 'ganhou_pec_no_siaps' && !p.audit_eval?.hasGain) return false;
              if (activeAuditFilter === 'perdeu_x' && !p.audit_eval?.hasLoss) return false;
              if (activeAuditFilter === 'para_perder_x' && !p.audit_eval?.hasParcial) return false;
              if (activeAuditFilter === 'sem_visita' && !p.audit_eval?.isSemVisita) return false;
              if (activeAuditFilter === 'bolsa_familia' && !p.bolsaFamilia) return false;
          }
          return true;
        });

        return filtered.sort((a, b) => {
          const eqA = String(a.equipe || "Sem Equipe").trim(); const eqB = String(b.equipe || "Sem Equipe").trim();
          if (eqA !== eqB) return eqA === "Sem Equipe" ? 1 : eqB === "Sem Equipe" ? -1 : eqA.localeCompare(eqB);
          const maA = isNaN(parseInt(a.microarea, 10)) ? 999999 : parseInt(a.microarea, 10);
          const maB = isNaN(parseInt(b.microarea, 10)) ? 999999 : parseInt(b.microarea, 10);
          if (maA !== maB) return maA - maB;
          return compareEnderecos(a.endereco, b.endereco);
        });
      }, [preAuditPatients, activeAuditFilter, latestPecBucket]);

      // Filtragem da nova aba de EXAMES
      const examesFilteredPatients = useMemo(() => {
        return baseFilteredPatients.filter(p => {
            // Aplica filtro de busca geral primeiro
            if (searchQuery.trim() !== '') {
                const q = searchQuery.toLowerCase();
                if (!(p.nomePec && p.nomePec.toLowerCase().includes(q)) && 
                    !(p.nomeSiaps && p.nomeSiaps.toLowerCase().includes(q)) && 
                    !p.cpf.includes(q) && 
                    !p.cns.includes(q) &&
                    !(p.endereco && p.endereco.toLowerCase().includes(q))) {
                    return false;
                }
            }

            let hasEligibleExame = false;
            const showAll = selectedExameTypes.length === 0;

            const checkExamMatch = (ind, item) => {
                const isNa = p.bp?.['SIAPS']?.[ind]?.[item] === 'NA' || p.bp?.[latestPecBucket]?.[ind]?.[item] === 'NA';
                if (isNa) return false;
                
                const hasPec = p.bp?.[latestPecBucket]?.[ind]?.[item] === true;
                const hasSiaps = p.bp?.['SIAPS']?.[ind]?.[item] === true;
                const status = (hasPec || hasSiaps) ? 'OK' : 'PENDENTES';
                
                if (statusExameFilter !== 'TODOS' && statusExameFilter !== status) return false;
                return true;
            };

            if ((showAll || selectedExameTypes.includes('C4-E')) && p.indicadores?.includes('C4')) {
                if (checkExamMatch('C4', 'E')) hasEligibleExame = true;
            }
            if ((showAll || selectedExameTypes.includes('C7-A')) && p.indicadores?.includes('C7')) {
                if (checkExamMatch('C7', 'A')) hasEligibleExame = true;
            }
            if ((showAll || selectedExameTypes.includes('C7-D')) && p.indicadores?.includes('C7')) {
                if (checkExamMatch('C7', 'D')) hasEligibleExame = true;
            }

            return hasEligibleExame;
        }).sort((a,b) => {
            const eqA = String(a.equipe || "Sem Equipe").trim(); const eqB = String(b.equipe || "Sem Equipe").trim();
            if (eqA !== eqB) return eqA === "Sem Equipe" ? 1 : eqB === "Sem Equipe" ? -1 : eqA.localeCompare(eqB);
            const maA = isNaN(parseInt(a.microarea, 10)) ? 999999 : parseInt(a.microarea, 10);
            const maB = isNaN(parseInt(b.microarea, 10)) ? 999999 : parseInt(b.microarea, 10);
            if (maA !== maB) return maA - maB;
            return compareEnderecos(a.endereco, b.endereco);
        });
      }, [baseFilteredPatients, selectedExameTypes, statusExameFilter, searchQuery, latestPecBucket]);

      
      useEffect(() => setCurrentPagePats(1), [searchQuery, patientIndicatorFilter, activeAuditFilter, selectedTeam, selectedMicroareas, baseFilter]);
      useEffect(() => setCurrentPageRot(1), [searchQuery, activeAuditFilter, selectedTeam, selectedMicroareas, baseFilter]);
      useEffect(() => setCurrentPageExames(1), [searchQuery, selectedExameTypes, statusExameFilter, selectedTeam, selectedMicroareas, baseFilter]);
      
      const pagedPatients = useMemo(() => {
          const start = (currentPagePats - 1) * rowsPerPage;
          return tableFilteredPatients.slice(start, start + rowsPerPage);
      }, [tableFilteredPatients, currentPagePats]);
      
      const pagedRoteiro = useMemo(() => {
          const start = (currentPageRot - 1) * rowsPerPage;
          return tableFilteredPatients.slice(start, start + rowsPerPage);
      }, [tableFilteredPatients, currentPageRot]);

      const pagedExames = useMemo(() => {
          const start = (currentPageExames - 1) * rowsPerPage;
          return examesFilteredPatients.slice(start, start + rowsPerPage);
      }, [examesFilteredPatients, currentPageExames]);

      const globalWeeklyStats = useMemo(() => {
        return BUCKETS.map(b => {
          let totalScore = 0;
          let patientSet = new Set();

          CORE_INDICATORS.forEach(ind => {
            let indSum = 0;
            let indCount = 0;
            baseFilteredPatients.forEach(p => {
              if (p.indicadores && p.indicadores.includes(ind)) {
                const scoreValue = p.scores?.[b]?.[ind];
                if (scoreValue !== null && scoreValue !== undefined) {
                  indSum += scoreValue;
                  indCount++;
                  patientSet.add(p.id);
                }
              }
            });
            const indAvg = indCount > 0 ? (indSum / indCount) : 0;
            totalScore += indAvg;
          });

          return { bucket: b, avg: Math.round(totalScore / CORE_INDICATORS.length), count: patientSet.size };
        });
      }, [baseFilteredPatients]);

      const uniqueIndicatorsInDataset = useMemo(() => {
        const s = new Set(); patientsData.forEach(p => p.indicadores && p.indicadores.forEach(i => { if (CORE_INDICATORS.includes(i)) s.add(i); })); 
        return Array.from(s).sort();
      }, [patientsData]);

      const renderFastSearchFilters = () => (
        <div className="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm animate-fade-in">
          <h3 className="text-[9px] font-black text-slate-500 uppercase tracking-widest flex items-center gap-2 mb-3">
            <ShieldAlert className="h-3 w-3 text-amber-500" /> Filtros Assistenciais Rápidos (Pistas Clínicas)
          </h3>
          <div className="flex flex-wrap gap-2">
            <button onClick={() => setActiveAuditFilter('todos')} className={`px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-wider border transition-all ${activeAuditFilter === 'todos' ? 'bg-slate-800 text-white border-slate-800 shadow-md' : 'bg-white border-slate-300 text-slate-600 hover:text-slate-900 hover:bg-slate-50'}`}>Exibir Todos ({auditCounts.todos})</button>
            <button onClick={() => setActiveAuditFilter('ganhou_pec_no_siaps')} className={`px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-wider border transition-all flex items-center gap-1.5 ${activeAuditFilter === 'ganhou_pec_no_siaps' ? 'bg-emerald-600 text-white border-emerald-500 shadow-md' : 'bg-emerald-50 border-emerald-200 text-emerald-700 hover:bg-emerald-100'}`}><ArrowUpCircle className="h-3.5 w-3.5" /> Ganhos ({auditCounts.ganhou_pec_no_siaps})</button>
            <button onClick={() => setActiveAuditFilter('perdeu_x')} className={`px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-wider border transition-all flex items-center gap-1.5 ${activeAuditFilter === 'perdeu_x' ? 'bg-rose-600 text-white border-rose-500 shadow-md' : 'bg-rose-50 border-rose-200 text-rose-700 hover:bg-rose-100'}`}>Perdas/Quedas ({auditCounts.perdeu_x})</button>
            <button onClick={() => setActiveAuditFilter('para_perder_x')} className={`px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-wider border transition-all flex items-center gap-1.5 ${activeAuditFilter === 'para_perder_x' ? 'bg-orange-600 text-white border-orange-500 shadow-md' : 'bg-orange-50 border-orange-200 text-orange-700 hover:bg-orange-100'}`}>Metas Parciais ({auditCounts.para_perder_x})</button>
            <button onClick={() => setActiveAuditFilter('sem_visita')} className={`px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-wider border transition-all flex items-center gap-1.5 ${activeAuditFilter === 'sem_visita' ? 'bg-fuchsia-600 text-white border-fuchsia-500 shadow-md' : 'bg-fuchsia-50 border-fuchsia-200 text-fuchsia-700 hover:bg-fuchsia-100'}`}><UserMinus className="h-3.5 w-3.5" /> Sem Visita ACS ({auditCounts.sem_visita})</button>
            <button onClick={() => setActiveAuditFilter('bolsa_familia')} className={`px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-wider border transition-all flex items-center gap-1.5 ${activeAuditFilter === 'bolsa_familia' ? 'bg-amber-600 text-white border-amber-500 shadow-md' : 'bg-amber-50 border-amber-200 text-amber-700 hover:bg-amber-100'}`}><Wallet className="h-3.5 w-3.5" /> Bolsa Família ({auditCounts.bolsa_familia})</button>
          </div>
        </div>
      );

      const renderDetailedSearchBar = () => (
        <div className="bg-white border border-slate-200 p-4 rounded-xl flex flex-wrap gap-4 items-center animate-fade-in shadow-sm">
          <div className="relative flex-1 min-w-[240px]">
            <Search className="absolute left-3 top-2.5 h-4 w-4 text-slate-400" />
            <input type="text" placeholder="Buscar por Nome do PEC, CPF, CNS ou Rua..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full pl-9 pr-4 py-2 bg-white border border-slate-300 rounded-lg text-xs text-slate-900 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" />
          </div>
          <select value={patientIndicatorFilter} onChange={(e) => setPatientIndicatorFilter(e.target.value)} className="px-3 py-2 bg-white border border-slate-300 rounded-lg text-xs text-slate-800 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 font-medium">
            <option value="TODAS">Todos Indicadores</option>
            {uniqueIndicatorsInDataset.map(code => <option key={code} value={code}>{code}</option>)}
          </select>
        </div>
      );

      return (
        <div className="min-h-screen bg-slate-50 text-slate-900 font-sans pb-12">
          
          {/* Tela Modal de Upload / Carregamento Bloqueante */}
          {uploadLoading.show && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[99999] flex flex-col items-center justify-center transition-all duration-300">
              <div className="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md flex flex-col items-center animate-fade-in">
                <div className="w-14 h-14 border-4 border-t-indigo-600 border-r-blue-600 border-b-slate-200 border-l-slate-200 rounded-full animate-spin mb-6"></div>
                <h2 className="text-lg font-black text-slate-800 mb-2 text-center leading-tight">{uploadLoading.text}</h2>
                <div className="w-full bg-slate-100 rounded-full h-2.5 mt-4 overflow-hidden border border-slate-200 relative">
                   <div className="bg-indigo-600 h-full rounded-full transition-all duration-300 relative overflow-hidden" style={{width: `${uploadLoading.progress}%`}}>
                       <div className="absolute top-0 left-0 right-0 bottom-0 bg-white/20 animate-pulse"></div>
                   </div>
                </div>
                <p className="text-[10px] text-slate-500 mt-4 font-bold text-center uppercase tracking-widest">Processamento Intenso em Andamento...</p>
              </div>
            </div>
          )}

          {toast.show && (
            <div className={`fixed bottom-5 right-5 z-[99999] flex items-center gap-2 px-4 py-3 rounded-xl shadow-2xl border animate-fade-in ${toast.type === 'error' ? 'bg-rose-100 border-rose-500 text-rose-800' : 'bg-white border-slate-200 text-slate-800'}`}>
              <span className={`h-2.5 w-2.5 rounded-full ${toast.type === 'success' ? 'bg-emerald-500' : toast.type === 'error' ? 'bg-rose-500 animate-pulse' : 'bg-blue-500'}`} />
              <span className="text-xs font-semibold">{toast.message}</span>
            </div>
          )}

          <header className="border-b border-slate-200 bg-white/90 backdrop-blur px-6 py-4 sticky top-0 z-40 shadow-sm">
            <div className="max-w-[1400px] mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
              <div className="flex items-center gap-3 w-full md:w-auto">
                <div className="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center border border-indigo-200"><Target className="h-5 w-5" /></div>
                <div>
                  <h1 className="text-base font-black flex items-center gap-2 tracking-tight text-slate-800">Monitor de GAPs USF</h1>
                  <p className="text-[10px] text-slate-500 uppercase tracking-widest font-mono">Painel Analítico de Indicadores &bull; Previne Brasil</p>
                </div>
              </div>

              <div className="flex flex-wrap items-center gap-2 w-full md:w-auto bg-slate-100 p-1.5 rounded-xl border border-slate-200">
                <span className="text-[10px] font-bold text-slate-500 uppercase mr-1 ml-1">Upload:</span>
                
                <label className={`${uploadStatus['SIAPS'] ? 'bg-emerald-600 hover:bg-emerald-500' : 'bg-indigo-600 hover:bg-indigo-500'} text-white font-bold px-3 py-1.5 rounded text-xs cursor-pointer flex items-center gap-1.5 transition-all shadow-sm`} title="Base Oficial do SIAPS (Alvo)">
                  {uploadStatus['SIAPS'] ? <><svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg> SIAPS OK</> : <><Upload className="h-3 w-3" /> SIAPS</>}
                  <input type="file" multiple accept=".xlsx, .xls, .csv" onChange={(e) => handleExcelUpload(e, 'SIAPS')} className="hidden" />
                </label>
                
                <div className="w-px h-5 bg-slate-300 mx-1 hidden sm:block"></div>
                
                <label className={`${uploadStatus['W1'] ? 'bg-emerald-600 hover:bg-emerald-500' : 'bg-blue-600 hover:bg-blue-500'} text-white font-bold px-3 py-1.5 rounded text-xs cursor-pointer flex items-center gap-1.5 transition-all shadow-sm`} title="Semana 1 do PEC">
                  {uploadStatus['W1'] ? <><svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg> W1 OK</> : 'W1'}
                  <input type="file" multiple accept=".xlsx, .xls, .csv" onChange={(e) => handleExcelUpload(e, 'W1')} className="hidden" />
                </label>
                
                <label className={`${uploadStatus['W2'] ? 'bg-emerald-600 hover:bg-emerald-500' : 'bg-blue-600 hover:bg-blue-500'} text-white font-bold px-3 py-1.5 rounded text-xs cursor-pointer flex items-center gap-1.5 transition-all shadow-sm`} title="Semana 2 do PEC">
                  {uploadStatus['W2'] ? <><svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg> W2 OK</> : 'W2'}
                  <input type="file" multiple accept=".xlsx, .xls, .csv" onChange={(e) => handleExcelUpload(e, 'W2')} className="hidden" />
                </label>

                <label className={`${uploadStatus['W3'] ? 'bg-emerald-600 hover:bg-emerald-500' : 'bg-blue-600 hover:bg-blue-500'} text-white font-bold px-3 py-1.5 rounded text-xs cursor-pointer flex items-center gap-1.5 transition-all shadow-sm`} title="Semana 3 do PEC">
                  {uploadStatus['W3'] ? <><svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg> W3 OK</> : 'W3'}
                  <input type="file" multiple accept=".xlsx, .xls, .csv" onChange={(e) => handleExcelUpload(e, 'W3')} className="hidden" />
                </label>

                <label className={`${uploadStatus['W4'] ? 'bg-emerald-600 hover:bg-emerald-500' : 'bg-blue-600 hover:bg-blue-500'} text-white font-bold px-3 py-1.5 rounded text-xs cursor-pointer flex items-center gap-1.5 transition-all shadow-sm`} title="Semana 4 do PEC">
                  {uploadStatus['W4'] ? <><svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg> W4 OK</> : 'W4'}
                  <input type="file" multiple accept=".xlsx, .xls, .csv" onChange={(e) => handleExcelUpload(e, 'W4')} className="hidden" />
                </label>
                
                <div className="w-px h-5 bg-slate-300 mx-1 hidden sm:block"></div>

                <button onClick={handleClearMockData} className="bg-rose-50 hover:bg-rose-100 text-rose-600 font-bold px-3 py-1.5 rounded text-xs cursor-pointer flex items-center gap-1.5 transition-all border border-rose-200 shadow-sm ml-1" title="Zerar Banco de Dados">
                  <Trash2 className="h-3 w-3" /> Limpar
                </button>
              </div>
            </div>
          </header>

          <nav className="bg-white border-b border-slate-200 px-6 mb-6">
            <div className="max-w-[1400px] mx-auto flex gap-6 overflow-x-auto font-medium">
              <button onClick={() => setActiveTab('indicators')} className={`py-4 text-xs uppercase tracking-widest font-black border-b-2 transition-all flex items-center gap-2 cursor-pointer whitespace-nowrap ${activeTab === 'indicators' ? 'border-indigo-600 text-indigo-700' : 'border-transparent text-slate-500 hover:text-slate-800'}`}><Activity className="h-4 w-4" /> Desempenho Global</button>
              <button onClick={() => setActiveTab('patients')} className={`py-4 text-xs uppercase tracking-widest font-black border-b-2 transition-all flex items-center gap-2 cursor-pointer whitespace-nowrap ${activeTab === 'patients' ? 'border-blue-600 text-blue-700' : 'border-transparent text-slate-500 hover:text-slate-800'}`}><Users className="h-4 w-4" /> Lista Geral de GAPs ({preAuditPatients.length})</button>
              <button onClick={() => setActiveTab('roteiro')} className={`py-4 text-xs uppercase tracking-widest font-black border-b-2 transition-all flex items-center gap-2 cursor-pointer whitespace-nowrap ${activeTab === 'roteiro' ? 'border-emerald-600 text-emerald-700' : 'border-transparent text-slate-500 hover:text-slate-800'}`}><BookOpen className="h-4 w-4" /> 📋 Roteiro de Rua (ACS)</button>
              <button onClick={() => setActiveTab('exames')} className={`py-4 text-xs uppercase tracking-widest font-black border-b-2 transition-all flex items-center gap-2 cursor-pointer whitespace-nowrap ${activeTab === 'exames' ? 'border-amber-600 text-amber-700' : 'border-transparent text-slate-500 hover:text-slate-800'}`}><Microscope className="h-4 w-4" /> 🔬 [EXAMES]</button>
              <button onClick={() => setActiveTab('logs')} className={`py-4 text-xs uppercase tracking-widest font-black border-b-2 transition-all flex items-center gap-2 cursor-pointer whitespace-nowrap ${activeTab === 'logs' ? 'border-slate-800 text-slate-800' : 'border-transparent text-slate-500 hover:text-slate-800'}`}><Terminal className="h-4 w-4" /> Logs & Python</button>
            </div>
          </nav>

          <main className="max-w-[1400px] mx-auto px-6 space-y-6">
            
            <div className="bg-white border border-slate-200 p-4 rounded-xl shadow-sm flex flex-col gap-3 animate-fade-in relative z-20">
              <div className="flex items-center justify-between w-full border-b border-slate-100 pb-3">
                <div className="flex items-center gap-1.5">
                  <Search className="h-3.5 w-3.5 text-indigo-600" />
                  <h3 className="text-[10px] font-black text-slate-600 uppercase tracking-widest">Parâmetros de Territorialização</h3>
                </div>
                <div className="text-[9px] bg-emerald-50 border border-emerald-200 text-emerald-700 px-2 py-0.5 rounded font-mono font-bold">
                  Nota Sintética Ativa (Fórmula Linear)
                </div>
              </div>
              
              <div className="grid grid-cols-1 sm:grid-cols-12 gap-4 relative pt-1">
                <div className="sm:col-span-3 flex flex-col gap-1.5 relative z-10">
                  <label className="text-[9px] font-black text-slate-500 uppercase tracking-wider">Equipe da USF (INE)</label>
                  <select value={selectedTeam} onChange={(e) => setSelectedTeam(e.target.value)} className="w-full px-2.5 py-1.5 bg-white border border-slate-300 rounded-lg text-xs text-slate-800 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 relative">
                    {uniqueTeams.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
                
                <div className="sm:col-span-3 flex flex-col gap-1.5 relative z-30">
                  <label className="text-[9px] font-black text-slate-500 uppercase tracking-wider">Microárea ACS (Filtro)</label>
                  <MultiSelect options={uniqueMicroareas} selected={selectedMicroareas} onChange={setSelectedMicroareas} placeholder="Todas as Microáreas" />
                </div>

                <div className="sm:col-span-6 flex flex-col gap-1.5 relative z-10">
                  <label className="text-[9px] font-black text-slate-500 uppercase tracking-wider">Universo de Amostragem (Origem)</label>
                  <div className="grid grid-cols-3 gap-2">
                    <button onClick={() => setBaseFilter('pura')} className={`px-2 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-wider transition-all border ${baseFilter === 'pura' ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' : 'bg-white border-slate-300 text-slate-600 hover:bg-slate-50'}`}>Todos ({countPura})</button>
                    <button onClick={() => setBaseFilter('sincronizada')} className={`px-2 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-wider transition-all border ${baseFilter === 'sincronizada' ? 'bg-emerald-600 border-emerald-600 text-white shadow-md' : 'bg-white text-emerald-600 border-emerald-200 hover:bg-emerald-50'}`}>Sincronizados ({countSincronizada})</button>
                    <button onClick={() => setBaseFilter('nao_sincronizada')} className={`px-2 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-wider transition-all border ${baseFilter === 'nao_sincronizada' ? 'bg-orange-500 border-orange-500 text-white shadow-md' : 'bg-white text-orange-600 border-orange-200 hover:bg-orange-50'}`}>Não Sinc. ({countNaoSincronizada})</button>
                  </div>
                </div>
              </div>
            </div>

            {/* ABA DESEMPENHO GLOBAL */}
            {activeTab === 'indicators' && (
              <div className="space-y-4 animate-fade-in relative z-10">
                <div className="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm relative overflow-hidden">
                  <div className="flex flex-col md:flex-row md:items-center justify-between gap-3 mb-6 border-b border-slate-100 pb-4">
                    <div>
                      <h2 className="text-sm font-black text-slate-800 uppercase tracking-wider">Evolução do Desempenho Global</h2>
                    </div>
                    <div className="flex flex-wrap items-center gap-2">
                      <button onClick={handleGeneratePDFReport} className="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-white rounded-lg text-[10px] font-black uppercase tracking-wider shadow-md transition-all flex items-center gap-2">
                          <FileText className="w-4 h-4" /> 
                          Relatório PDF (A4)
                      </button>
                      <button onClick={exportToExcel} className="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg text-[10px] font-black uppercase tracking-wider shadow-md transition-all flex items-center gap-2">
                          <FileText className="w-4 h-4" /> 
                          Gerar Planilha Pontos
                      </button>
                    </div>
                  </div>

                  <div className="bg-slate-50 border border-slate-200 rounded-2xl flex flex-col overflow-hidden shadow-sm mb-6 font-imprimir">
                    <div className="bg-slate-100 px-4 py-3 border-b border-slate-200 flex justify-between items-center">
                      <h4 className="text-[10px] font-black text-slate-700 leading-tight flex items-center gap-2 uppercase tracking-widest">
                        <span className="bg-indigo-600 text-white px-2 py-0.5 rounded text-[9px] font-bold shadow-sm">Média Global</span>
                        Indicador de Síntese (Nota Final da Equipe)
                      </h4>
                      <span className="text-[10px] font-mono text-slate-500 font-bold">f = Σ(C2 a C7) / 6</span>
                    </div>
                    
                    <div className="px-5 py-6 bg-white">
                       <div className="flex gap-4 overflow-x-auto pb-2">
                           {globalWeeklyStats.map(s => (
                               <div key={s.bucket} className={`flex-1 min-w-[120px] rounded-xl p-5 flex flex-col items-center justify-center border transition-all ${s.bucket === latestPecBucket ? 'bg-indigo-50 border-indigo-200 shadow-md transform scale-105' : 'bg-white border-slate-200 hover:bg-slate-50'}`}>
                                   <span className={`text-2xl md:text-3xl font-black leading-none ${s.bucket === latestPecBucket ? 'text-indigo-600' : 'text-slate-700'}`}>
                                     {s.count > 0 || s.bucket === 'SIAPS' ? `${s.avg}%` : '-'}
                                   </span>
                                   <span className="text-[9px] font-black uppercase text-slate-500 mt-2 tracking-wider">{s.bucket === 'SIAPS' ? 'SIAPS (Base)' : s.bucket.replace('W', 'Semana ')}</span>
                                   <span className="text-[9px] text-slate-400 mt-0.5 font-bold">
                                     {s.count > 0 || s.bucket === 'SIAPS' ? `${s.count} Alvos Ativos` : 'Pendente'}
                                   </span>
                               </div>
                           ))}
                       </div>
                    </div>
                  </div>

                  <div className="flex flex-wrap items-center gap-2 mb-6 bg-slate-50 p-2 rounded-xl border border-slate-200 no-pdf">
                    <span className="text-[9px] font-black text-slate-500 uppercase ml-2 mr-1">Filtrar Visão:</span>
                    <button onClick={() => setActiveIndicatorView('TODOS')} className={`px-4 py-2 rounded-lg text-[10px] font-black tracking-widest transition-all shadow-sm ${activeIndicatorView === 'TODOS' ? 'bg-indigo-600 text-white' : 'bg-white text-slate-600 hover:text-slate-900 border border-slate-200'}`}>TODOS</button>
                    {CORE_INDICATORS.map(code => (
                      <button key={code} onClick={() => setActiveIndicatorView(code)} className={`px-4 py-2 rounded-lg text-[10px] font-black tracking-widest transition-all flex items-center gap-1 shadow-sm ${activeIndicatorView === code ? 'bg-indigo-600 text-white' : 'bg-white text-slate-600 hover:text-slate-900 border border-slate-200'}`}>
                        {code}
                      </button>
                    ))}
                  </div>

                  <div className="hidden lg:grid grid-cols-12 gap-4 items-center px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl mb-4 text-[10px] font-black uppercase text-slate-500 tracking-wider">
                    <div className="col-span-12 lg:col-span-4">Indicadores &amp; Requisitos Clínicos</div>
                    <div className="col-span-12 lg:col-span-8 grid grid-cols-5 gap-3 text-center">
                      <div>SIAPS (Base)</div>
                      <div>Planilha Sem 1</div>
                      <div>Planilha Sem 2</div>
                      <div>Planilha Sem 3</div>
                      <div>Planilha Sem 4</div>
                    </div>
                  </div>

                  <div className="flex flex-col gap-6">
                    {CORE_INDICATORS.map(indCode => {
                      if (activeIndicatorView !== 'TODOS' && activeIndicatorView !== indCode) return null;
                      
                      const metadata = {
                        C2: { name: "CUIDADO NO DESENVOLVIMENTO INFANTIL", desc: "Consultas de Puericultura, Vacinas, Visitas" },
                        C3: { name: "CUIDADO NA GESTAÇÃO E PUERPÉRIO", desc: "Pré-Natal, dTpa, Exames Clínicos, Visitas ACS" },
                        C4: { name: "CUIDADO DA PESSOA COM DIABETES", desc: "Acompanhamento Clínico, PA, Pé Diabético, Hemo. Glicada" },
                        C5: { name: "CUIDADO DA PESSOA COM HIPERTENSÃO", desc: "Consultas Médicas, Aferição de PA, Visitas Periódicas" },
                        C6: { name: "CUIDADO DA PESSOA IDOSA", desc: "Avaliação Multidimensional, Vacina Influenza, Visitas" },
                        C7: { name: "CUIDADO DA MULHER NA PREVENÇÃO DO CÂNCER", desc: "Prevenção Câncer Colo de Útero, Mama, HPV e Saúde Sexual" }
                      }[indCode];

                      const indScoresPerBucket = BUCKETS.map(b => {
                          let bTotalScore = 0; let bCount = 0;
                          baseFilteredPatients.forEach(p => {
                              if (p.indicadores && p.indicadores.includes(indCode)) {
                                  const val = p.scores?.[b]?.[indCode];
                                  if (val !== null && val !== undefined) {
                                    bCount++; bTotalScore += val;
                                  }
                              }
                          });
                          return { bucket: b, avg: bCount > 0 ? Math.round(bTotalScore / bCount) : 0, count: bCount };
                      });

                      const itemsList = { C2: ['A','B','C','D','E'], C3: ['A','B','C','D','E','F','G','H','I','J','K'], C4: ['A','B','C','D','E','F'], C5: ['A','B','C','D'], C6: ['A','B','C','D'], C7: ['A','B','C','D'] }[indCode];
                      const itemsDetails = {
                        C2: { A: "1ª consulta presencial até 30º dia", B: "09 consultas até 2 anos", C: "09 registros peso/altura", D: "02 visitas ACS", E: "Vacinas completas" },
                        C3: { A: "1ª consulta até 12ª sem", B: "07 consultas pré-natal", C: "07 registros de PA", D: "07 registros peso/altura", E: "03 visitas ACS", F: "dTpa a partir 20ª sem", G: "Testes rápidos HIV/Sífilis 1º Tri", H: "Testes rápidos HIV/Sífilis 3º Tri", I: "Consulta puerpério", J: "Visita ACS puerpério", K: "Atendimento odontológico" },
                        C4: { A: "Consulta presencial (6m)", B: "Aferição de PA (6m)", C: "Peso/Altura (12m)", D: "02 Visitas ACS (12m)", E: "Hemoglobina Glicada", F: "Avaliação do pé diabético" },
                        C5: { A: "Consulta presencial (6m)", B: "Aferição de PA (6m)", C: "Peso/Altura (12m)", D: "02 Visitas ACS (12m)" },
                        C6: { A: "Consulta presencial (12m)", B: "Peso/Altura (12m)", C: "02 Visitas ACS (12m)", D: "Vacina Influenza" },
                        C7: { A: "Rastreio câncer colo do útero (últimos 36m)", B: "Vacina HPV (09 a 14 anos)", C: "Atendimento saúde sexual/reprod. (últimos 12m)", D: "Rastreamento câncer de mama de 50 a 69 anos (últimos 24m)" }
                      }[indCode];
                      const itemsPts = {
                        C2: { A:20, B:20, C:20, D:20, E:20 }, C3: { A:10, B:9, C:9, D:9, E:9, F:9, G:9, H:9, I:9, J:9, K:9 },
                        C4: { A:20, B:15, C:15, D:20, E:15, F:15 }, C5: { A:25, B:25, C:25, D:25 }, C6: { A:25, B:25, C:25, D:25 }, C7: { A:20, B:30, C:30, D:20 }
                      }[indCode];

                      return (
                        <div key={indCode} className="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm transition-all hover:shadow-md animate-fade-in">
                          <div className="bg-slate-50 px-5 py-4 border-b border-slate-200 flex items-center justify-between">
                            <h4 className="text-sm font-black text-slate-800 leading-tight flex items-center gap-2">
                              <span className="bg-indigo-600 px-2.5 py-1 rounded text-white text-[10px] font-black tracking-widest shadow-sm">{indCode}</span> {metadata.name}
                            </h4>
                          </div>

                          <div className="p-5 space-y-5">
                            <div className="grid grid-cols-12 gap-4 items-center bg-indigo-50 border border-indigo-100 p-4 rounded-xl">
                              <div className="col-span-12 lg:col-span-4 flex items-center gap-3">
                                <div className="w-1.5 h-8 bg-indigo-600 rounded-full"></div>
                                <div>
                                  <span className="text-[9px] font-black text-indigo-600 uppercase tracking-widest block">Média do Indicador</span>
                                  <span className="text-xs font-black text-slate-800">Desempenho Direto ({indCode})</span>
                                </div>
                              </div>
                              <div className="col-span-12 lg:col-span-8 grid grid-cols-5 gap-3">
                                 {indScoresPerBucket.map(s => {
                                     const hasData = s.count > 0 || s.bucket === 'SIAPS';
                                     const bgClass = !hasData ? 'bg-slate-100 border-slate-200 text-slate-400' : s.avg >= 80 ? 'bg-emerald-50 border-emerald-200 text-emerald-700 font-bold' : s.avg >= 50 ? 'bg-amber-50 border-amber-200 text-amber-700 font-bold' : 'bg-rose-50 border-rose-200 text-rose-700 font-bold';
                                     return (
                                         <div key={s.bucket} className={`rounded-xl p-3 flex flex-col items-center justify-center border ${bgClass} text-center shadow-sm`}>
                                             <span className="text-base md:text-lg font-black leading-none">{hasData ? `${s.avg}%` : '-'}</span>
                                             <span className="text-[8px] font-black uppercase opacity-70 mt-1.5 tracking-wider">{s.bucket}</span>
                                             <span className="text-[7.5px] font-bold opacity-60 mt-0.5">{hasData ? `${s.count} Alvos` : 'Pendente'}</span>
                                         </div>
                                     );
                                 })}
                              </div>
                            </div>

                            <div className="flex items-center gap-2 py-1">
                              <span className="text-[8px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap">Critérios Assistenciais do Indicador</span>
                              <div className="w-full h-px bg-slate-200"></div>
                            </div>

                            <div className="space-y-3">
                              {itemsList.map(k => {
                                const statsPerBucket = BUCKETS.map(b => {
                                  let feitos = 0; let pendentes = 0; let semFaturamento = 0; let isentos = 0;
                                  const isBucketActive = baseFilteredPatients.some(p => p.scores?.[b]?.[indCode] !== null && p.scores?.[b]?.[indCode] !== undefined);

                                  baseFilteredPatients.forEach(p => {
                                    if (p.indicadores && p.indicadores.includes(indCode)) {
                                      if (!isBucketActive) {
                                          semFaturamento++;
                                          return;
                                      }
                                      
                                      if (p.bp?.[b]?.[indCode] === undefined) {
                                          semFaturamento++;
                                          return;
                                      }

                                      let isOk = p.bp?.[b]?.[indCode]?.[k];
                                      if (isOk === "NA") {
                                          isentos++; 
                                      } else if(isOk === true) {
                                          feitos++;
                                      } else {
                                          pendentes++;
                                      }
                                    }
                                  });
                                  return { bucket: b, feitos, pendentes, semFaturamento, isentos };
                                });

                                return (
                                  <div key={k} className="grid grid-cols-12 gap-4 items-center bg-white hover:bg-slate-50 border border-slate-200 p-4 rounded-xl transition-all shadow-sm">
                                    <div className="col-span-12 lg:col-span-4 pr-2">
                                      <div className="flex items-start gap-2.5">
                                        <span className="text-slate-400 font-mono font-bold text-xs mt-0.5">[{k}]</span>
                                        <div>
                                          <span className="text-slate-800 font-semibold text-xs leading-relaxed block text-imprimir">{itemsDetails[k]}</span>
                                          <div className="flex items-center gap-2 mt-1.5">
                                            <span className="text-indigo-700 font-black bg-indigo-50 border border-indigo-100 px-2 py-0.5 rounded text-[8.5px] font-mono tracking-wider">{itemsPts[k]} PTS</span>
                                            <span className="text-[8.5px] text-slate-500 font-bold uppercase" title="Baseada no SIAPS">
                                                Meta Dinâmica
                                            </span>
                                          </div>
                                        </div>
                                      </div>
                                    </div>

                                    <div className="col-span-12 lg:col-span-8 grid grid-cols-5 gap-3">
                                      {statsPerBucket.map(obj => {
                                        const total = obj.feitos + obj.pendentes;
                                        const isMuted = obj.semFaturamento > 0 && total === 0 && obj.isentos === 0;
                                        const percentage = total > 0 ? Math.round((obj.feitos / total) * 100) : 0;
                                        const textColor = isMuted ? 'text-slate-400' : percentage >= 80 ? 'text-emerald-600' : percentage >= 50 ? 'text-amber-600' : 'text-rose-600';

                                        return (
                                          <div key={obj.bucket} className={`flex flex-col justify-between rounded-xl border p-2.5 min-h-[76px] transition-all ${obj.bucket === latestPecBucket ? 'border-indigo-300 bg-indigo-50 shadow-sm' : 'border-slate-200 bg-slate-50'} relative`}>
                                            <div className="flex items-center justify-between">
                                              <span className="text-[7.5px] font-black text-slate-400 uppercase tracking-widest">{obj.bucket}</span>
                                              {!isMuted && total > 0 && <span className={`text-[9.5px] font-mono font-black ${textColor}`}>{percentage}%</span>}
                                            </div>
                                            
                                            {isMuted ? (
                                              <div className="text-center py-2">
                                                <span className="text-[9px] text-slate-400 italic block font-semibold">Pendente</span>
                                                <div className="w-full bg-slate-200 h-1 rounded-full mt-1.5 overflow-hidden"><div className="h-full bg-slate-300 rounded-full" style={{ width: '0%' }}></div></div>
                                              </div>
                                            ) : total === 0 && obj.isentos > 0 ? (
                                              <div className="text-center py-2">
                                                <span className="text-[9px] text-indigo-500 block font-black border border-indigo-200 bg-indigo-100 rounded py-1 px-1 mt-1">ISENTOS N/A</span>
                                              </div>
                                            ) : (
                                              <div className="mt-2.5">
                                                <div className="flex items-baseline justify-between">
                                                  <span className={`text-sm md:text-base font-black ${textColor} tracking-tight`}>{obj.feitos}</span>
                                                  <span className="text-[8.5px] text-slate-400 font-bold font-mono">/ {total}</span>
                                                </div>
                                                <div className="w-full bg-slate-200 h-1 rounded-full mt-1.5 overflow-hidden">
                                                  <div className={`h-full rounded-full transition-all duration-500 ${percentage >= 80 ? 'bg-emerald-500' : percentage >= 50 ? 'bg-amber-500' : 'bg-rose-500'}`} style={{ width: `${percentage}%` }}></div>
                                                </div>
                                                {obj.isentos > 0 && <div className="text-[7px] text-slate-400 text-center mt-1 uppercase tracking-widest font-bold">+{obj.isentos} N/A (Idade)</div>}
                                              </div>
                                            )}
                                          </div>
                                        );
                                      })}
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}

            {/* ABA LISTA GERAL DE GAPS */}
            {activeTab === 'patients' && (
              <div className="space-y-6 animate-fade-in relative z-10">
                {renderFastSearchFilters()}
                {renderDetailedSearchBar()}

                <div className="flex flex-col sm:flex-row justify-between items-center bg-white border border-slate-200 p-4 rounded-xl gap-3 animate-fade-in shadow-sm">
                  <div className="text-xs text-slate-500">
                    Mostrando <strong className="text-slate-800">{tableFilteredPatients.length}</strong> paciente(s) com base nos filtros clínicos.
                  </div>
                  <button onClick={handleExportTicketsExcel} className="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-4 py-2.5 rounded-lg text-xs flex items-center justify-center gap-2 transition-all shadow-md cursor-pointer">
                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    Exportar Auditoria de Tickets (Excel)
                  </button>
                </div>

                <div className="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
                  <div className="overflow-x-auto min-h-[400px]">
                    <table className="w-full text-left border-collapse whitespace-nowrap">
                      <thead>
                        <tr className="bg-slate-100 text-[10px] font-black uppercase text-slate-600 tracking-wider border-b border-slate-200">
                          <th className="px-5 py-3 sticky left-0 bg-slate-100 z-35 w-80 shadow-[1px_0_0_#e2e8f0]">Dados do Paciente / Localização</th>
                          <th className="px-5 py-3 text-center w-36 border-l border-slate-200 bg-slate-50">SIAPS (Referência)</th>
                          <th className="px-5 py-3 text-center w-48 border-l border-slate-200">Pontuação Atual ({latestPecBucket})</th>
                          <th className="px-5 py-3 border-l border-slate-200">Auditoria Clínica Detalhada (Ganhos &amp; Perdas)</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100 text-xs">
                        {pagedPatients.length > 0 ? pagedPatients.map(p => {
                          const coreInds = p.indicadores ? p.indicadores.filter(ind => CORE_INDICATORS.includes(ind)) : [];
                          const hasSiapsData = coreInds.some(ind => p.bp?.['SIAPS']?.[ind] !== undefined);
                          const hasAnyPecData = coreInds.some(ind => ['W1','W2','W3','W4'].some(bucket => p.bp?.[bucket]?.[ind] !== undefined));
                          const isSincronizado = hasSiapsData && hasAnyPecData;

                          return (
                            <tr key={p.id} className="hover:bg-slate-50 transition-colors">
                              <td className="px-5 py-4 sticky left-0 bg-white z-10 shadow-[1px_0_0_#e2e8f0] align-top">
                                <strong className="text-slate-800 text-xs flex flex-wrap items-center gap-1.5 max-w-[280px]">
                                  {p.bolsaFamilia && <span className="text-amber-600 text-xs font-black bg-amber-100 px-1.5 py-0.5 rounded border border-amber-200" title="Beneficiário do Bolsa Família">BF</span>}
                                  {p.nomePec ? <span className="truncate font-semibold text-slate-800" title={p.nomePec}>{p.nomePec}</span> : <span className="truncate font-normal text-slate-400 italic">⚠️ Aguardando PEC</span>}
                                  {isSincronizado && <span className="bg-emerald-100 border border-emerald-200 text-emerald-700 px-1 py-0.5 rounded text-[8px] font-black tracking-widest uppercase">Sinc.</span>}
                                  {!hasSiapsData && hasAnyPecData && <span className="bg-amber-100 border border-amber-200 text-amber-700 px-1 py-0.5 rounded text-[8px] font-black tracking-widest uppercase">Apenas PEC</span>}
                                  {hasSiapsData && !hasAnyPecData && <span className="bg-rose-100 border border-rose-200 text-rose-700 px-1 py-0.5 rounded text-[8px] font-black tracking-widest uppercase">Apenas SIAPS</span>}
                                  {p.is_nearing_deadline && <span className="bg-yellow-100 border border-yellow-200 text-yellow-700 px-1 py-0.5 rounded text-[8px] font-black tracking-widest uppercase flex items-center gap-0.5"><Clock className="w-2 h-2"/>Vence</span>}
                                </strong>
                                <div className="text-[9px] font-mono text-slate-500 mt-1">CPF: {p.cpf} &bull; CNS: {p.cns}</div>
                                <div className="text-[9px] text-slate-500 mt-1 truncate max-w-[280px]" title={p.endereco}>📍 {p.endereco}</div>
                                <div className="text-[9px] text-indigo-600 font-semibold mt-1">🏥 INE: {p.equipe} &bull; MA: {p.microarea === "XX" ? "XX" : p.microarea}</div>
                              </td>

                              <td className="px-5 py-4 text-center border-l border-slate-200 align-top bg-slate-50">
                                <div className="flex flex-col gap-1.5 items-center">
                                  {coreInds.map(ind => {
                                    const score = p.scores ? p.scores['SIAPS']?.[ind] : null;
                                    return (
                                      <div key={ind} className="flex flex-col items-center gap-1 bg-white border border-slate-200 p-1.5 rounded-lg w-full max-w-[120px] shadow-sm">
                                        <span className="text-[10px] font-black text-slate-500">{ind}</span>
                                        {score !== null && score !== undefined ? <span className="bg-slate-100 text-slate-700 border border-slate-200 px-2 py-0.5 rounded font-mono font-bold text-[9px]">{score} PTS</span> : <span className="text-[9px] text-slate-400 italic">Inexistente/Isento</span>}
                                      </div>
                                    );
                                  })}
                                </div>
                              </td>

                              <td className="px-5 py-4 text-center border-l border-slate-200 align-top">
                                <div className="flex flex-col gap-1.5 items-center">
                                  {coreInds.map(ind => {
                                    const scorePec = p.scores ? p.scores[latestPecBucket]?.[ind] : null;
                                    const hasData = scorePec !== null && scorePec !== undefined;
                                    const audit = hasData && p.recommendations && p.recommendations[latestPecBucket] ? p.recommendations[latestPecBucket][ind] : null;
                                    const sumGains = audit?.gains ? audit.gains.reduce((acc, curr) => acc + curr.pts, 0) : 0;
                                    const sumLosses = audit?.losses ? audit.losses.reduce((acc, curr) => acc + curr.pts, 0) : 0;

                                    return (
                                      <div key={ind} className="flex flex-col items-center gap-1 bg-slate-50 border border-slate-200 p-1.5 rounded-lg w-full max-w-[170px] shadow-sm">
                                        <span className="text-[10px] font-black text-slate-600">{ind}</span>
                                        {hasData ? (
                                          <React.Fragment>
                                            <span className="text-sm font-black text-slate-800">{scorePec} PTS</span>
                                            <div className="flex flex-wrap justify-center gap-1 text-[8px] font-mono font-bold">
                                              {sumGains > 0 && <span className="bg-emerald-50 text-emerald-700 border border-emerald-200 px-1.5 py-0.5 rounded">+{sumGains}G</span>}
                                              {sumLosses > 0 && <span className="bg-rose-50 text-rose-700 border border-rose-200 px-1.5 py-0.5 rounded">-{sumLosses}P</span>}
                                              {sumGains === 0 && sumLosses === 0 && <span className="text-slate-400 italic">Estável/Isento</span>}
                                            </div>
                                          </React.Fragment>
                                        ) : (
                                          <div className="py-1"><span className="text-slate-400 italic text-[11px] block font-semibold">Pendente</span></div>
                                        )}
                                      </div>
                                    );
                                  })}
                                </div>
                              </td>

                              <td className="px-5 py-4 border-l border-slate-200 align-top max-w-xl whitespace-normal">
                                <div className="flex flex-col gap-3">
                                  {coreInds.map(ind => {
                                      const audit = p.recommendations && p.recommendations[latestPecBucket] ? p.recommendations[latestPecBucket][ind] : null;
                                      if (!audit) return <div key={ind} className="bg-slate-50 border border-slate-200 p-3 rounded-xl text-center"><span className="text-slate-400 text-[10px] italic">Aguardando processamento PEC.</span></div>;

                                      return (
