<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plataforma de Inteligência em Saúde</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React 18 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; overflow: hidden; }
    /* Scrollbar personalizada */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    
    .fade-in { animation: fadeIn 0.4s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Ícones em SVG
    const Icons = {
      Home: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>,
      Database: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path></svg>,
      Chart: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>,
      ArrowRight: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>,
      Check: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>,
      Menu: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>,
    };

    const LandingPage = ({ setView }) => {
      return (
        <div className="h-full overflow-y-auto fade-in p-6 lg:p-12">
          {/* Hero Section */}
          <div className="max-w-5xl mx-auto mb-16 text-center">
            <h1 className="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-6">
              Plataforma de Inteligência em Saúde
            </h1>
            <p className="text-lg text-slate-400 max-w-3xl mx-auto leading-relaxed">
              Uma suíte completa para ingestão, tratamento e análise de dados da Atenção Primária. 
              Transforme planilhas despadronizadas em painéis de decisão estratégica em duas etapas simples.
            </p>
          </div>

          {/* Pipeline Flow */}
          <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-center gap-6 mb-20">
            
            {/* Step 1: Motor X */}
            <div 
              onClick={() => setView('motorX')}
              className="flex-1 bg-slate-800/50 border border-slate-700 hover:border-blue-500/50 rounded-2xl p-8 cursor-pointer transition-all duration-300 hover:scale-105 hover:bg-slate-800 hover:shadow-[0_0_30px_rgba(59,130,246,0.15)] group"
            >
              <div className="bg-blue-500/20 w-16 h-16 rounded-xl flex items-center justify-center text-blue-400 mb-6 group-hover:scale-110 transition-transform">
                <Icons.Database />
              </div>
              <h2 className="text-2xl font-bold text-white mb-3">1. Motor X (Padronização)</h2>
              <p className="text-slate-400 text-sm mb-6 leading-relaxed">
                O Motor Principal de ingestão. Analisa planilhas brutas, limpa inconsistências, aplica regras temporais (C2/C3) e exporta uma base de dados padronizada, pronta para análise.
              </p>
              <ul className="space-y-2 mb-6">
                {['Validação Temporal de Dados', 'Padronização de Colunas', 'Identificação de Duplicidades'].map((item, i) => (
                  <li key={i} className="flex items-center text-sm text-slate-300">
                    <span className="text-blue-400 mr-2"><Icons.Check /></span> {item}
                  </li>
                ))}
              </ul>
              <button className="text-blue-400 font-semibold text-sm flex items-center group-hover:text-blue-300">
                Acessar Motor X <span className="ml-2 group-hover:translate-x-1 transition-transform">→</span>
              </button>
            </div>

            {/* Arrow */}
            <div className="text-slate-600 hidden md:block rotate-90 md:rotate-0">
              <Icons.ArrowRight />
            </div>

            {/* Step 2: Motor PEC */}
            <div 
              onClick={() => setView('motorPec')}
              className="flex-1 bg-slate-800/50 border border-slate-700 hover:border-emerald-500/50 rounded-2xl p-8 cursor-pointer transition-all duration-300 hover:scale-105 hover:bg-slate-800 hover:shadow-[0_0_30px_rgba(16,185,129,0.15)] group"
            >
              <div className="bg-emerald-500/20 w-16 h-16 rounded-xl flex items-center justify-center text-emerald-400 mb-6 group-hover:scale-110 transition-transform">
                <Icons.Chart />
              </div>
              <h2 className="text-2xl font-bold text-white mb-3">2. Dashboard Notas</h2>
              <p className="text-slate-400 text-sm mb-6 leading-relaxed">
                O centro de tomada de decisão. Consome os dados limpos pelo Motor X e gera métricas, acompanha GAP assistencial e fornece inteligência para melhoria dos indicadores de saúde.
              </p>
              <ul className="space-y-2 mb-6">
                {['Cálculo de Indicadores (ISF)', 'Monitoramento de GAP Assistencial', 'Análise Preditiva e Dashboards'].map((item, i) => (
                  <li key={i} className="flex items-center text-sm text-slate-300">
                    <span className="text-emerald-400 mr-2"><Icons.Check /></span> {item}
                  </li>
                ))}
              </ul>
              <button className="text-emerald-400 font-semibold text-sm flex items-center group-hover:text-emerald-300">
                Acessar Dashboard <span className="ml-2 group-hover:translate-x-1 transition-transform">→</span>
              </button>
            </div>

          </div>

          {/* Footer Info */}
          <div className="max-w-4xl mx-auto bg-slate-900 border border-slate-800 rounded-xl p-6 text-center text-sm text-slate-500">
            <p><strong>Dica de uso:</strong> O fluxo ideal consiste em primeiro processar seus arquivos extraídos do sistema no <strong>Motor X</strong> para gerar a planilha de auditoria padronizada. Em seguida, importe o arquivo gerado no <strong>Dashboard Notas</strong> para visualizar os resultados consolidados.</p>
          </div>
        </div>
      );
    };

    const App = () => {
      const [currentView, setCurrentView] = useState('home');
      const [sidebarOpen, setSidebarOpen] = useState(true);

      const menuItems = [
        { id: 'home', label: 'Início', icon: <Icons.Home /> },
        { id: 'motorX', label: 'Motor X (Padronização)', icon: <Icons.Database /> },
        { id: 'motorPec', label: 'Dashboard Notas', icon: <Icons.Chart /> },
      ];

      return (
        <div className="flex h-screen w-screen bg-slate-950 overflow-hidden">
          
          {/* Sidebar */}
          <div className={`${sidebarOpen ? 'w-64' : 'w-20'} bg-slate-900 border-r border-slate-800 flex flex-col transition-all duration-300 z-20 shrink-0`}>
            <div className="h-16 flex items-center justify-between px-4 border-b border-slate-800">
              {sidebarOpen && <span className="font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 truncate">PIS Web</span>}
              <button onClick={() => setSidebarOpen(!sidebarOpen)} className="p-2 rounded-lg hover:bg-slate-800 text-slate-400 transition-colors">
                <Icons.Menu />
              </button>
            </div>
            
            <nav className="flex-1 py-4 px-2 space-y-1">
              {menuItems.map(item => (
                <button
                  key={item.id}
                  onClick={() => setCurrentView(item.id)}
                  className={`w-full flex items-center px-3 py-3 rounded-lg transition-colors group relative ${
                    currentView === item.id 
                      ? 'bg-blue-600/10 text-blue-400' 
                      : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200'
                  }`}
                  title={!sidebarOpen ? item.label : ''}
                >
                  <div className={`${currentView === item.id ? 'text-blue-400' : 'text-slate-500 group-hover:text-slate-300'}`}>
                    {item.icon}
                  </div>
                  {sidebarOpen && <span className="ml-3 font-medium text-sm text-left truncate">{item.label}</span>}
                  
                  {/* Indicador ativo na sidebar recolhida */}
                  {!sidebarOpen && currentView === item.id && (
                    <div className="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-8 bg-blue-500 rounded-r-full"></div>
                  )}
                </button>
              ))}
            </nav>

            {sidebarOpen && (
              <div className="p-4 border-t border-slate-800">
                <div className="text-[10px] text-slate-500 uppercase tracking-wider font-semibold mb-2">Ambiente Local</div>
                <div className="text-xs text-slate-400">Verifique se os arquivos HTML originais estão na mesma pasta.</div>
              </div>
            )}
          </div>

          {/* Main Content */}
          <div className="flex-1 relative bg-[#0f172a]">
            {/* O Home (Landing Page) é renderizado como React */}
            {currentView === 'home' && <LandingPage setView={setCurrentView} />}
            
            {/* Os motores são iframes para preservar seus scripts complexos (PyScript, Pyodide) sem conflitos na DOM */}
            <div className={`w-full h-full ${currentView === 'motorX' ? 'block' : 'hidden'}`}>
              <iframe 
                src="./MOTOR_PRINCIPAL.HTML" 
                className="w-full h-full border-0 bg-white"
                title="Motor X"
                onError={(e) => console.error("Erro ao carregar iframe", e)}
              ></iframe>
            </div>

            <div className={`w-full h-full ${currentView === 'motorPec' ? 'block' : 'hidden'}`}>
              <iframe 
                src="./dashboard_siaps_pec.html" 
                className="w-full h-full border-0 bg-slate-950"
                title="Dashboard Notas"
              ></iframe>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
